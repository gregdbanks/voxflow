<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>VoxFlow</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <span class="dot" data-state="idle"></span>
        <h1>VoxFlow</h1>
        <nav class="tabs" role="tablist">
          <button type="button" class="tab" data-tab="dictate" aria-selected="true">Dictate</button>
          <button type="button" class="tab" data-tab="history" aria-selected="false">History</button>
          <button type="button" class="tab" data-tab="settings" aria-selected="false">Settings</button>
        </nav>
      </header>
      <section class="panel-body" data-view="dictate">
        <div id="privacy-badge" class="privacy-badge privacy-local" title="Audio stays on this machine">
          <span class="privacy-icon">🔒</span>
          <span class="privacy-label">Local · audio never leaves this machine</span>
        </div>
        <p id="status">Hold <kbd>⌥</kbd> to dictate (or <kbd>⌘⌥Z</kbd>)</p>
        <div id="model-download" class="model-download" hidden>
          <p class="model-download-label">Downloading speech model… <span id="model-download-percent">0%</span></p>
          <div class="model-download-track"><div id="model-download-fill" class="model-download-fill"></div></div>
          <p class="model-download-hint">One-time download (~1.5 GB). Everything else already works.</p>
        </div>
        <pre id="transcription" aria-live="polite"></pre>
      </section>
      <section class="panel-body" data-view="history" hidden>
        <input type="search" id="history-search" class="history-search" placeholder="Search transcriptions…" autocomplete="off" />
        <ul id="history-list" class="history-list"></ul>
        <p id="history-empty" class="history-empty" hidden>No transcriptions yet.</p>
      </section>
      <section class="panel-body" data-view="settings" hidden>
        <div id="settings-dictionary"></div>
      </section>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
